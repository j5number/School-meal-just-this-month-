<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 급식 - 투표 & 취향 맞춤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .allergy-badge { 
            font-size: 0.7rem; padding: 1px 4px; border-radius: 4px; 
            background: #fee2e2; color: #ef4444; margin-left: 2px;
            font-weight: bold; border: 1px solid #fecaca;
        }
        .vote-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .vote-btn:active { transform: scale(0.9); }
        .tab-active { color: #3b82f6 !important; }
        .progress-bar-transition { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-xl bg-gray-50 pb-40">

    <header class="sticky top-0 z-40 glass-morphism px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white/80">
        <div>
            <h1 id="display-school-name" class="text-xl font-bold text-gray-800 tracking-tight">학교를 선택하세요</h1>
            <p id="display-school-location" class="text-[10px] text-gray-400 font-medium uppercase tracking-widest mt-0.5">School Meal Info</p>
        </div>
        <button onclick="app.toggleFavoriteSchool()" id="fav-toggle-btn" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-200 transition-transform active:scale-90">
            <i class="fa-regular fa-star text-white"></i>
        </button>
    </header>

    <main id="main-content" class="mt-4">
        <!-- Section: School Search (Initial State) -->
        <section id="setup-section" class="px-6 space-y-4">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
                <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-school text-blue-500"></i> 우리 학교 찾기
                </h2>
                <div class="relative">
                    <input type="text" id="school-search-input" placeholder="학교 이름을 입력하세요 (예: 한빛중)" 
                        class="w-full bg-gray-50 border-none rounded-2xl py-4 pl-5 pr-12 text-sm focus:ring-2 focus:ring-blue-400 transition-all outline-none">
                    <button onclick="app.searchSchool()" class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 bg-blue-600 text-white rounded-xl shadow-md flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </button>
                </div>
            </div>
            <div id="school-search-results" class="space-y-3"></div>
        </section>

        <!-- Section: Meal Display -->
        <section id="meal-section" class="hidden px-6 pb-10">
            <!-- Date Picker -->
            <div class="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-calendar-day text-blue-500"></i>
                    <input type="date" id="meal-date-picker" onchange="app.handleDateChange(this.value)" 
                        class="font-bold text-gray-700 focus:outline-none bg-transparent cursor-pointer text-sm">
                </div>
                <div class="flex gap-1">
                    <button onclick="app.offsetDate(-1)" class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-blue-50 hover:text-blue-600">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button onclick="app.offsetDate(1)" class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-blue-50 hover:text-blue-600">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Meal Cards Container -->
            <div id="meal-content" class="space-y-6"></div>

            <div class="mt-8 bg-white rounded-3xl p-6 border border-gray-200 shadow-sm mb-10">
                <div class="flex items-center gap-2 mb-4 border-b pb-3">
                    <i class="fa-solid fa-circle-exclamation text-red-500"></i>
                    <h3 class="font-bold text-gray-800 text-sm">알레르기 유발 물질 안내</h3>
                </div>
                <div id="allergy-guide-grid" class="grid grid-cols-3 gap-x-2 gap-y-1 text-[10px]">
                    <!-- JS fills this -->
                </div>
            </div>
        </section>

        <!-- Section: Favorites Management -->
        <section id="favorites-section" class="hidden px-6 space-y-6 pb-10">
            <h2 class="text-xl font-bold text-gray-800">취향 관리</h2>
            <div id="favorites-list" class="space-y-6"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass-morphism border-t border-gray-100 px-8 py-4 flex justify-around items-center rounded-t-[2.5rem] z-50 bg-white/90">
        <button onclick="ui.showSection('meal')" id="nav-meal" class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fa-solid fa-utensils text-lg"></i>
            <span class="text-[9px] font-bold">급식정보</span>
        </button>
        <button onclick="ui.showSection('setup')" id="nav-setup" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fa-solid fa-magnifying-glass text-lg"></i>
            <span class="text-[9px] font-bold">학교변경</span>
        </button>
        <button onclick="ui.showSection('favorites')" id="nav-fav" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fa-solid fa-heart text-lg"></i>
            <span class="text-[9px] font-bold">내취향</span>
        </button>
    </nav>

    <!-- Loader Overlay -->
    <div id="global-loader" class="fixed inset-0 bg-white/80 z-[100] hidden flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-10 w-10 mb-4"></div>
        <p class="text-sm text-gray-500 font-medium">급식을 가져오는 중...</p>
    </div>

    <script>
        const allergyMap = {
            "1": "난류", "2": "우유", "3": "메밀", "4": "땅콩", "5": "대두", "6": "밀", "7": "고등어", "8": "게", "9": "새우", "10": "돼지고기", "11": "복숭아", "12": "토마토", "13": "아황산류", "14": "호두", "15": "닭고기", "16": "쇠고기", "17": "오징어", "18": "조개류", "19": "잣"
        };

        const state = {
            currentSchool: JSON.parse(localStorage.getItem('selectedSchool')) || null,
            favoriteSchools: JSON.parse(localStorage.getItem('favoriteSchools')) || [],
            favDishes: JSON.parse(localStorage.getItem('favDishes')) || [],
            badDishes: JSON.parse(localStorage.getItem('badDishes')) || [],
            votes: JSON.parse(localStorage.getItem('mealVotes')) || {}, // { voteKey: { up: 0, down: 0, myVote: 'up'|'down' } }
            selectedDate: new Date().toISOString().split('T')[0].replace(/-/g, '')
        };

        const ui = {
            showSection(section) {
                document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('nav button').forEach(b => {
                    b.classList.remove('text-blue-600');
                    b.classList.add('text-gray-400');
                });
                
                if (section === 'meal') {
                    if (!state.currentSchool) return this.showSection('setup');
                    document.getElementById('meal-section').classList.remove('hidden');
                    document.getElementById('nav-meal').classList.replace('text-gray-400', 'text-blue-600');
                    app.initMealView();
                } else if (section === 'setup') {
                    document.getElementById('setup-section').classList.remove('hidden');
                    document.getElementById('nav-setup').classList.replace('text-gray-400', 'text-blue-600');
                } else if (section === 'favorites') {
                    document.getElementById('favorites-section').classList.remove('hidden');
                    document.getElementById('nav-fav').classList.replace('text-gray-400', 'text-blue-600');
                    this.renderFavorites();
                }
            },
            toggleLoader(show) {
                document.getElementById('global-loader').classList.toggle('hidden', !show);
            },
            renderFavorites() {
                const list = document.getElementById('favorites-list');
                const renderGroup = (title, items, icon, colorClass, toggleFn) => `
                    <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
                        <h4 class="text-xs font-bold ${colorClass} mb-4 flex items-center gap-1.5 uppercase tracking-tight">
                            <i class="${icon}"></i> ${title}
                        </h4>
                        <div class="flex flex-wrap gap-2">
                            ${items.length ? items.map(dish => `
                                <div class="bg-gray-50 px-3 py-2 rounded-xl flex items-center gap-2 border border-gray-100">
                                    <span class="text-sm font-medium text-gray-700">${dish}</span>
                                    <button onclick="app.${toggleFn}('${dish}')" class="text-gray-300 hover:text-red-500 transition-colors">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </div>
                            `).join('') : '<p class="text-[11px] text-gray-300 italic">등록된 메뉴가 없습니다.</p>'}
                        </div>
                    </div>
                `;
                
                let html = renderGroup('내가 좋아하는 반찬', state.favDishes, 'fa-solid fa-star text-yellow-400', 'text-yellow-600', 'toggleFavDish');
                html += renderGroup('기피하는 반찬', state.badDishes, 'fa-solid fa-circle-minus text-red-400', 'text-red-600', 'toggleBadDish');
                list.innerHTML = html;
            }
        };

        const app = {
            init() {
                this.renderAllergyGuide();
                ui.showSection(state.currentSchool ? 'meal' : 'setup');
            },

            renderAllergyGuide() {
                document.getElementById('allergy-guide-grid').innerHTML = Object.entries(allergyMap).map(([n, v]) => `
                    <div class="flex items-center gap-1.5 pb-1">
                        <span class="text-red-500 font-bold w-4 text-[9px]">${n}.</span>
                        <span class="text-gray-500">${v}</span>
                    </div>
                `).join('');
            },

            async searchSchool() {
                const query = document.getElementById('school-search-input').value.trim();
                if (query.length < 2) return;
                ui.toggleLoader(true);
                try {
                    const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    const container = document.getElementById('school-search-results');
                    container.innerHTML = '';
                    if (data.schoolInfo) {
                        data.schoolInfo[1].row.forEach(school => {
                            const div = document.createElement('div');
                            div.className = "bg-white p-5 rounded-[1.5rem] border border-gray-100 shadow-sm active:bg-blue-50 transition-all cursor-pointer";
                            div.innerHTML = `
                                <p class="font-bold text-gray-800 text-sm">${school.SCHUL_NM}</p>
                                <p class="text-[10px] text-gray-400 mt-1">${school.ORG_RDNMA}</p>
                            `;
                            div.onclick = () => {
                                state.currentSchool = school;
                                localStorage.setItem('selectedSchool', JSON.stringify(school));
                                ui.showSection('meal');
                            };
                            container.appendChild(div);
                        });
                    }
                } catch (e) { console.error(e); }
                ui.toggleLoader(false);
            },

            initMealView() {
                if (!state.currentSchool) return;
                document.getElementById('display-school-name').textContent = state.currentSchool.SCHUL_NM;
                document.getElementById('display-school-location').textContent = state.currentSchool.ATPT_OFCDC_SC_NM;
                document.getElementById('meal-date-picker').value = `${state.selectedDate.substring(0,4)}-${state.selectedDate.substring(4,6)}-${state.selectedDate.substring(6,8)}`;
                const isFav = state.favoriteSchools.some(f => f.SD_SCHUL_CODE === state.currentSchool.SD_SCHUL_CODE);
                document.getElementById('fav-toggle-btn').innerHTML = isFav ? '<i class="fa-solid fa-star text-yellow-400"></i>' : '<i class="fa-regular fa-star text-white"></i>';
                this.fetchMeal();
            },

            async fetchMeal() {
                ui.toggleLoader(true);
                const container = document.getElementById('meal-content');
                try {
                    const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${state.currentSchool.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${state.currentSchool.SD_SCHUL_CODE}&MLSV_YMD=${state.selectedDate}`);
                    const data = await res.json();
                    container.innerHTML = '';
                    
                    if (data.mealServiceDietInfo) {
                        data.mealServiceDietInfo[1].row.forEach(meal => {
                            const voteKey = `vote_${state.currentSchool.SD_SCHUL_CODE}_${state.selectedDate}_${meal.MMEAL_SC_NM}`;
                            const items = meal.DDISH_NM.split('<br/>').map(s => {
                                const m = s.match(/\(([^)]+)\)/);
                                return { name: s.replace(/\([^)]+\)/g, '').trim(), allergy: m ? m[1].split('.') : [] };
                            });

                            const hasFav = items.some(i => state.favDishes.includes(i.name));
                            const hasBad = items.some(i => state.badDishes.includes(i.name));

                            const card = document.createElement('div');
                            card.className = `rounded-[2.5rem] p-7 border transition-all duration-500 shadow-sm ${hasFav ? 'bg-blue-50 border-blue-200' : hasBad ? 'bg-red-50 border-red-100' : 'bg-white border-gray-100'}`;
                            card.innerHTML = `
                                <div class="flex justify-between items-start mb-5">
                                    <div>
                                        <span class="px-4 py-1.5 rounded-full text-[11px] font-bold text-white ${hasFav ? 'bg-blue-600' : hasBad ? 'bg-red-500' : 'bg-gray-800'}">
                                            ${hasFav ? '최애 메뉴가 있어요!' : hasBad ? '⚠️ 기피 메뉴 주의' : meal.MMEAL_SC_NM}
                                        </span>
                                        <p class="text-[10px] text-gray-400 mt-2 font-medium tracking-wide">${meal.CAL_INFO}</p>
                                    </div>
                                    <div class="text-right w-1/2">
                                        <div class="flex justify-end gap-3 mb-2" id="vote-btns-${voteKey.replace(/\s/g, '')}"></div>
                                        <div class="h-1 w-full bg-gray-100 rounded-full flex overflow-hidden" id="vote-bar-${voteKey.replace(/\s/g, '')}"></div>
                                        <p class="text-[8px] text-gray-300 mt-1 uppercase tracking-widest font-bold" id="vote-count-${voteKey.replace(/\s/g, '')}">0 Votes</p>
                                    </div>
                                </div>
                                <ul class="space-y-3.5 mb-6">
                                    ${items.map(i => `
                                        <li class="flex items-center justify-between group">
                                            <span class="text-[15px] ${state.favDishes.includes(i.name) ? 'text-blue-600 font-bold' : state.badDishes.includes(i.name) ? 'text-gray-300 line-through' : 'text-gray-700'}">
                                                ${i.name}${i.allergy.map(n => `<span class="allergy-badge">${n}</span>`).join('')}
                                            </span>
                                            <div class="flex gap-2">
                                                <button onclick="app.toggleFavDish('${i.name}')" class="p-1 transition-colors ${state.favDishes.includes(i.name) ? 'text-yellow-400' : 'text-gray-200 hover:text-yellow-200'}">
                                                    <i class="fa-solid fa-star"></i>
                                                </button>
                                                <button onclick="app.toggleBadDish('${i.name}')" class="p-1 transition-colors ${state.badDishes.includes(i.name) ? 'text-red-400' : 'text-gray-200 hover:text-red-200'}">
                                                    <i class="fa-solid fa-circle-minus"></i>
                                                </button>
                                            </div>
                                        </li>
                                    `).join('')}
                                </ul>
                                <div class="pt-4 border-t border-gray-100 flex flex-wrap gap-1">
                                    <span class="text-[9px] text-gray-400 w-full mb-1">포함된 성분 요약:</span>
                                    ${[...new Set(items.flatMap(i => i.allergy))].sort((a,b)=>a-b).map(n => `<span class="text-[9px] bg-gray-50 text-gray-500 px-2.5 py-1 rounded-lg border border-gray-100">${n}.${allergyMap[n]}</span>`).join('')}
                                </div>
                            `;
                            container.appendChild(card);
                            this.renderVotes(voteKey);
                        });
                    } else {
                        const m = parseInt(state.selectedDate.substring(4,6));
                        container.innerHTML = `
                            <div class="bg-white p-12 rounded-[2.5rem] text-center border-2 border-dashed border-gray-100">
                                <i class="fa-solid fa-bowl-food text-gray-100 text-5xl mb-4"></i>
                                <p class="text-gray-400 text-sm font-medium leading-relaxed">아직 식단이 등록되지 않았습니다.<br>
                                <span class="text-[10px] mt-2 block text-gray-300">${m}월 식단은 보통 ${m-1}월 말에 업데이트됩니다.</span></p>
                            </div>`;
                    }
                } catch (e) { console.error(e); }
                ui.toggleLoader(false);
            },

            renderVotes(key) {
                const idKey = key.replace(/\s/g, '');
                const voteData = state.votes[key] || { up: 0, down: 0, myVote: null };
                const total = voteData.up + voteData.down;
                const upPct = total === 0 ? 0 : Math.round((voteData.up / total) * 100);
                const downPct = total === 0 ? 0 : 100 - upPct;

                const btnContainer = document.getElementById(`vote-btns-${idKey}`);
                const barContainer = document.getElementById(`vote-bar-${idKey}`);
                const countText = document.getElementById(`vote-count-${idKey}`);

                btnContainer.innerHTML = `
                    <button onclick="app.castVote('${key}', 'up')" class="vote-btn flex items-center gap-1.5 ${voteData.myVote === 'up' ? 'text-blue-500' : 'text-gray-300'}">
                        <i class="fa-solid fa-thumbs-up text-xs"></i><span class="text-[10px] font-black">${upPct}%</span>
                    </button>
                    <button onclick="app.castVote('${key}', 'down')" class="vote-btn flex items-center gap-1.5 ${voteData.myVote === 'down' ? 'text-red-500' : 'text-gray-300'}">
                        <i class="fa-solid fa-thumbs-down text-xs"></i><span class="text-[10px] font-black">${downPct}%</span>
                    </button>
                `;

                barContainer.innerHTML = `
                    <div class="bg-blue-400 h-full progress-bar-transition" style="width: ${upPct}%"></div>
                    <div class="bg-red-400 h-full progress-bar-transition" style="width: ${downPct}%"></div>
                `;
                
                countText.textContent = `${total} People Voted`;
            },

            castVote(key, type) {
                if (!state.votes[key]) state.votes[key] = { up: 0, down: 0, myVote: null };
                const v = state.votes[key];

                if (v.myVote === type) {
                    v[type]--;
                    v.myVote = null;
                } else {
                    if (v.myVote) v[v.myVote]--;
                    v[type]++;
                    v.myVote = type;
                }

                localStorage.setItem('mealVotes', JSON.stringify(state.votes));
                this.renderVotes(key);
            },

            handleDateChange(v) { state.selectedDate = v.replace(/-/g, ''); this.fetchMeal(); },
            offsetDate(d) {
                const date = new Date(`${state.selectedDate.substring(0,4)}-${state.selectedDate.substring(4,6)}-${state.selectedDate.substring(6,8)}`);
                date.setDate(date.getDate() + d);
                state.selectedDate = date.toISOString().split('T')[0].replace(/-/g, '');
                this.initMealView();
            },
            toggleFavDish(n) {
                if (state.favDishes.includes(n)) state.favDishes = state.favDishes.filter(x => x !== n);
                else { state.favDishes.push(n); state.badDishes = state.badDishes.filter(x => x !== n); }
                this.save();
            },
            toggleBadDish(n) {
                if (state.badDishes.includes(n)) state.badDishes = state.badDishes.filter(x => x !== n);
                else { state.badDishes.push(n); state.favDishes = state.favDishes.filter(x => x !== n); }
                this.save();
            },
            toggleFavoriteSchool() {
                if (!state.currentSchool) return;
                const idx = state.favoriteSchools.findIndex(s => s.SD_SCHUL_CODE === state.currentSchool.SD_SCHUL_CODE);
                if (idx > -1) state.favoriteSchools.splice(idx, 1);
                else state.favoriteSchools.push(state.currentSchool);
                localStorage.setItem('favoriteSchools', JSON.stringify(state.favoriteSchools));
                this.initMealView();
            },
            save() {
                localStorage.setItem('favDishes', JSON.stringify(state.favDishes));
                localStorage.setItem('badDishes', JSON.stringify(state.badDishes));
                this.fetchMeal();
                if (!document.getElementById('favorites-section').classList.contains('hidden')) ui.renderFavorites();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
